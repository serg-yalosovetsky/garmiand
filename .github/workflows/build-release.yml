name: build-release

on:
  push:
    branches: ["main", "work"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run Python tests
        run: pytest -q

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Android release APK
        working-directory: android
        run: gradle :app:assembleRelease

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Download Connect IQ SDK
        run: |
          curl -L -o ciq-sdk.zip "https://developer.garmin.com/downloads/connect-iq/sdks/connectiq-sdk-lin-7.4.3-2025-01-17-589b4d7f9.zip"
          unzip -q ciq-sdk.zip -d ciq-sdk

      - name: Build Garmin app (PRG)
        run: |
          java -jar ciq-sdk/*/bin/monkeybrains.jar \
            -f garmin/monkey.jungle \
            -o garmin/build/garmiand.prg \
            -d fenix7

      - name: Upload Garmin PRG artifact
        uses: actions/upload-artifact@v4
        with:
          name: garmin-prg
          path: garmin/build/*.prg
